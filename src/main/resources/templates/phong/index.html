<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{apt/fragments/app-layout :: page('Trang chủ', ~{::section})}">
<section>
	<div class="page-head">
		<h1>Trang chủ</h1>
		<p class="muted">Quản lý chung cư.</p>
	</div>

	<div class="grid">
		<div class="card">
			<div class="card__title">Tổng chung cư</div>
			<div class="card__value" th:text="${buildingsCount}">0</div>
			<div class="card__actions">
				<a class="btn" th:href="@{/chung-cu}">Xem danh sách</a>
				<a class="btn btn--primary" th:href="@{/chung-cu/them}">Thêm mới</a>
			</div>
		</div>
	</div>

	<div class="section">
		<div class="section__head">
			<h2>Mới cập nhật</h2>
			<a class="link" th:href="@{/chung-cu}">Tất cả</a>
		</div>

		<div class="table-wrap">
			<table class="table">
				<thead>
				<tr>
					<th style="width: 80px;">ID</th>
					<th>Tên</th>
					<th>Địa chỉ</th>
					<th style="width: 160px;"></th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(latestBuildings)}">
					<td colspan="4" class="muted">Chưa có dữ liệu.</td>
				</tr>
				<tr th:each="b : ${latestBuildings}">
					<td th:text="${b.id}">1</td>
					<td th:text="${b.ten}">Tên</td>
					<td th:text="${b.diaChi}">Địa chỉ</td>
					<td class="td-actions">
						<a class="btn btn--sm" th:href="@{/chung-cu/{id}(id=${b.id})}">Xem</a>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</div>
</section>
</html>
