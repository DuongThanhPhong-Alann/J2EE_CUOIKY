<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{apt/fragments/app-layout :: pageWithHead(${chatTitle}, ~{::section}, ~{::extraHead})}">
<th:block th:fragment="extraHead">
	<link rel="stylesheet" th:href="@{/phong/apt-chat.css}" />
</th:block>
<section class="aptChatMode">
	<div class="aptChatShell aptChatShellPage">
		<aside class="aptChatPanel aptChatSidebar">
			<div class="aptChatSidebarHeader">
				<div>
					<div class="aptChatTitle">Chat</div>
					<div class="aptChatSmall" th:text="${me.hoTen}">Me</div>
					<div class="aptChatSidebarTools">
						<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatFullscreenBtn">Toàn màn hình</button>
						<div class="aptChatPopoverWrap">
							<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatThemeBtn">Chủ đề</button>
							<div class="aptChatPopover" id="chatThemePopover" hidden>
								<div class="aptChatPopoverHeader">
									<div class="aptChatPopoverTitle">Chủ đề (100 màu)</div>
									<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
								</div>
								<div class="aptChatSwatchGrid" id="chatThemeGrid"></div>
							</div>
						</div>
						<div class="aptChatPopoverWrap">
							<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatBgBtn">Ảnh nền</button>
							<div class="aptChatPopover" id="chatBgPopover" hidden>
								<div class="aptChatPopoverHeader">
									<div class="aptChatPopoverTitle">Ảnh nền</div>
									<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
								</div>
								<div class="aptChatWallpaperGrid" id="chatBgGrid"></div>
							</div>
						</div>
					</div>
				</div>
				<div class="aptChatPopoverWrap">
	<button class="aptChatBtn" type="button" id="chatUserSearchBtn">Tìm người</button>
	<div class="aptChatPopover aptChatUserSearchPopover" id="chatUserSearchPopover" hidden>
		<div class="aptChatPopoverHeader">
			<div class="aptChatPopoverTitle">Tạo/mở chat riêng</div>
			<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
		</div>
		<label class="aptChatField">
			<span>Email</span>
			<input class="aptChatInput" id="chatUserSearchInput" type="email" placeholder="user@apt.local" autocomplete="off" />
		</label>
		<div class="aptChatUserList" id="chatUserSearchList"></div>
		<div class="aptChatTip">Nhập email rồi nhấn Enter để mở chat.</div>
	</div>
</div>
			</div>
			<div class="aptChatSidebarBody">
				<div class="aptChatList">
					<a class="aptChatItem"
					   th:each="it : ${sidebar}"
					   th:href="@{/chat/{id}(id=${it.chat.id})}"
					   th:classappend="${activeChatId != null and activeChatId == it.chat.id} ? ' aptChatItemActive' : ''">
						<div class="aptChatAvatar" aria-hidden="true"
						     th:classappend="${it.peerRole != null} ? ' aptChatAvatar--' + it.peerRole : ''">
							<span th:text="${#strings.substring(it.name,0,1)}">C</span>
						</div>
						<div class="aptChatMeta">
							<div class="aptChatName" th:text="${it.name}">Name</div>
							<div class="aptChatType" th:text="${it.subtitle}">Type</div>
						</div>
					</a>
				</div>
			</div>
		</aside>

		<section class="aptChatPanel aptChatMain">
			<header class="aptChatMainHeader">
				<div class="left">
					<div class="aptChatH1 aptChatTitleRow">
						<span class="aptChatPeerDot" th:if="${peerRole != null}"
						      th:classappend="' aptChatPeerDot--' + peerRole"></span>
						<span th:text="${chatTitle}">Title</span>
					</div>
					<div class="aptChatH2" th:text="${chatSubtitle}">Subtitle</div>
				</div>
				<div class="right">
					<a class="aptChatBtn" th:if="${chat.loai == 'building' && chat.idChungCu != null}"
					   th:href="@{/chung-cu/{id}(id=${chat.idChungCu})}">Xem chung cư</a>
					<a class="aptChatBtn aptChatBtnGhost" th:href="@{/}">Thoát</a>
				</div>
			</header>

			<div class="aptChatMsgs" id="msgs">
				<div class="aptChatEmpty" th:if="${#lists.isEmpty(messages)}">Chưa có tin nhắn. Gửi tin nhắn đầu tiên nhé.</div>
				<div class="aptChatMsgList" th:if="${!#lists.isEmpty(messages)}">
					<div class="aptChatMsg"
					     th:each="m : ${messages}"
					     th:classappend="${m.idNguoiGui == meId} ? ' me' : ''">
						<div class="aptChatBubble">
							<div class="aptChatMetaLine">
								<div class="aptChatSenderWrap">
									<div class="aptChatSender"
									     th:text="${sendersById[m.idNguoiGui]?.hoTen ?: ('#' + m.idNguoiGui)}">
										Sender
									</div>
								</div>
								<div class="aptChatTime" th:text="${fmtTime.format(m.createdAt)}">12:00</div>
							</div>
							<div class="aptChatText" th:text="${m.noiDung}">Text</div>
						</div>
					</div>
					<div id="bottom"></div>
				</div>
			</div>

			<div class="aptChatComposer">
				<form class="aptChatComposerRow" method="post" th:action="@{/chat/{id}/messages(id=${chat.id})}">
					<div class="aptChatPopoverWrap" sec:authorize="hasAnyRole('ADMIN','RESIDENT')">
						<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatShareAptBtn">Link căn hộ</button>
						<div class="aptChatPopover" id="chatShareAptPopover" hidden>
							<div class="aptChatPopoverHeader">
								<div class="aptChatPopoverTitle">Gửi link căn hộ</div>
								<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
							</div>

							<label class="aptChatField">
								<span>Chung cư</span>
								<select class="aptChatInput" id="chatShareBuildingSelect">
									<option value="">Đang tải...</option>
								</select>
							</label>

							<label class="aptChatField">
								<span>Căn hộ</span>
								<select class="aptChatInput" id="chatShareApartmentSelect" disabled>
									<option value="">Chọn chung cư trước</option>
								</select>
							</label>

							<label class="aptChatField">
								<span>Link</span>
								<input class="aptChatInput mono" id="chatShareApartmentLink" type="text" readonly placeholder="Chọn căn hộ để lấy link" />
							</label>

							<div class="aptChatSidebarTools" style="margin-top:8px">
								<button class="aptChatBtn" type="button" id="chatShareCopyLinkBtn" disabled>Copy</button>
								<button class="aptChatBtn aptChatBtnPrimary" type="button" id="chatShareInsertLinkBtn" disabled>Chèn vào tin nhắn</button>
							</div>
							<div class="aptChatTip">Mẹo: Chèn link rồi nhấn Enter để gửi.</div>
						</div>
					</div>
					<textarea class="aptChatTextarea" name="noiDung" rows="1" placeholder="Nhập tin nhắn..." required></textarea>
					<button class="aptChatBtn aptChatBtnPrimary" type="submit">Gửi</button>
				</form>
				<div class="aptChatSmall aptChatHint">Mẹo: Enter để gửi, Shift+Enter để xuống dòng.</div>
			</div>
		</section>
	</div>

	<script th:src="@{/phong/chat.js}"></script>
</section>
</html>
