						<div class="aptChatPopoverWrap">
							<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatThemeBtn">Chá»§ Ä‘á»</button>
							<div class="aptChatPopover" id="chatThemePopover" hidden>
								<div class="aptChatPopoverHeader">
									<div class="aptChatPopoverTitle">Chá»§ Ä‘á» (100 mÃ u)</div>
									<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
								</div>
								<div class="aptChatSwatchGrid" id="chatThemeGrid"></div>
							</div>
						</div>
						<div class="aptChatPopoverWrap">
							<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatBgBtn">áº¢nh ná»n</button>
							<div class="aptChatPopover" id="chatBgPopover" hidden>
								<div class="aptChatPopoverHeader">
									<div class="aptChatPopoverTitle">áº¢nh ná»n</div>
									<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
								</div>
								<div class="aptChatWallpaperGrid" id="chatBgGrid"></div>
							</div>
						</div>
					</div>
				</div>
				<div class="aptChatPopoverWrap">
	<button class="aptChatBtn" type="button" id="chatUserSearchBtn">Tìm người</button>
	<div class="aptChatPopover aptChatUserSearchPopover" id="chatUserSearchPopover" hidden>
		<div class="aptChatPopoverHeader">
			<div class="aptChatPopoverTitle">Tạo/mở chat riêng</div>
			<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
		</div>
		<label class="aptChatField">
			<span>Email</span>
			<input class="aptChatInput" id="chatUserSearchInput" type="email" placeholder="user@apt.local" autocomplete="off" />
		</label>
		<div class="aptChatUserList" id="chatUserSearchList"></div>
		<div class="aptChatTip">Nhập email rồi nhấn Enter để mở chat.</div>
	</div>
</div>
			</div>
			<div class="aptChatSidebarBody">
				<div class="aptChatList">
					<a class="aptChatItem"
					   th:each="it : ${sidebar}"
					   th:href="@{/chat/{id}(id=${it.chat.id})}"
					   th:classappend="${activeChatId != null and activeChatId == it.chat.id} ? ' aptChatItemActive' : ''">
						<div class="aptChatAvatar" aria-hidden="true"
						     th:classappend="${it.peerRole != null} ? ' aptChatAvatar--' + it.peerRole : ''">
							<span th:text="${#strings.substring(it.name,0,1)}">C</span>
						</div>
						<div class="aptChatMeta">
							<div class="aptChatName" th:text="${it.name}">Name</div>
							<div class="aptChatType" th:text="${it.subtitle}">Type</div>
						</div>
					</a>
				</div>
			</div>
		</aside>

		<section class="aptChatPanel aptChatMain">
			<header class="aptChatMainHeader">
				<div class="left">
					<div class="aptChatH1 aptChatTitleRow">
						<span class="aptChatPeerDot" th:if="${peerRole != null}"
						      th:classappend="' aptChatPeerDot--' + peerRole"></span>
						<span th:text="${chatTitle}">Title</span>
					</div>
					<div class="aptChatH2" th:text="${chatSubtitle}">Subtitle</div>
				</div>
				<div class="right">
					<a class="aptChatBtn" th:if="${chat.loai == 'building' && chat.idChungCu != null}"
					   th:href="@{/chung-cu/{id}(id=${chat.idChungCu})}">Xem chung cÆ°</a>
				</div>
			</header>

			<div class="aptChatMsgs" id="msgs">
				<div class="aptChatEmpty" th:if="${#lists.isEmpty(messages)}">ChÆ°a cÃ³ tin nháº¯n. Gá»­i tin nháº¯n Ä‘áº§u tiÃªn nhÃ©.</div>

					     th:each="m : ${messages}"
					     th:classappend="${m.idNguoiGui == meId} ? ' me' : ''">
						<div class="aptChatBubble">
							<div class="aptChatMetaLine">
								<div class="aptChatSenderWrap">
									<div class="aptChatSender"
									     th:text="${sendersById[m.idNguoiGui]?.hoTen ?: ('#' + m.idNguoiGui)}">
										Sender
									</div>
								</div>
								<div class="aptChatTime" th:text="${fmtTime.format(m.createdAt)}">12:00</div>
							</div>
							<div class="aptChatText" th:text="${m.noiDung}">Text</div>
						</div>
					</div>
					<div id="bottom"></div>
				</div>
			</div>

			<div class="aptChatComposer">
				<form class="aptChatComposerRow" method="post" th:action="@{/chat/{id}/messages(id=${chat.id})}">
					<textarea class="aptChatTextarea" name="noiDung" rows="1" placeholder="Nháº­p tin nháº¯n..." required></textarea>
					<button class="aptChatBtn aptChatBtnPrimary" type="submit">Gá»­i</button>
				</form>
				<div class="aptChatSmall aptChatHint">Máº¹o: Enter Ä‘á»ƒ gá»­i, Shift+Enter Ä‘á»ƒ xuá»‘ng dÃ²ng.</div>
			</div>
		</section>
	</div>

	<script th:src="@{/phong/chat.js}"></script>
</section>
</html>
