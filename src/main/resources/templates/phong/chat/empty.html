<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{apt/fragments/app-layout :: pageWithHead('Chat', ~{::section}, ~{::extraHead})}">
<th:block th:fragment="extraHead">
	<link rel="stylesheet" th:href="@{/phong/apt-chat.css}" />
</th:block>
<section class="aptChatMode">
	<div class="aptChatShell aptChatShellPage">
		<div class="aptChatPanel aptChatSidebar">
			<div class="aptChatSidebarHeader">
				<div>
					<div class="aptChatTitle">Chat</div>
					<div class="aptChatSmall">Chưa có phòng chat để hiển thị.</div>
					<div class="aptChatSidebarTools">
						<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatFullscreenBtn">Toàn màn hình</button>
						<div class="aptChatPopoverWrap">
							<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatThemeBtn">Chủ đề</button>
							<div class="aptChatPopover" id="chatThemePopover" hidden>
								<div class="aptChatPopoverTitle">Chủ đề (100 màu)</div>
								<div class="aptChatSwatchGrid" id="chatThemeGrid"></div>
							</div>
						</div>
						<div class="aptChatPopoverWrap">
							<button class="aptChatBtn aptChatBtnGhost" type="button" id="chatBgBtn">Ảnh nền</button>
							<div class="aptChatPopover" id="chatBgPopover" hidden>
								<div class="aptChatPopoverTitle">Ảnh nền</div>
								<div class="aptChatWallpaperGrid" id="chatBgGrid"></div>
							</div>
						</div>
					</div>
				</div>
				<div class="aptChatPopoverWrap">
	<button class="aptChatBtn" type="button" id="chatUserSearchBtn">Tìm người</button>
	<div class="aptChatPopover aptChatUserSearchPopover" id="chatUserSearchPopover" hidden>
		<div class="aptChatPopoverHeader">
			<div class="aptChatPopoverTitle">Tạo/mở chat riêng</div>
			<button class="aptChatBtn aptChatBtnGhost aptChatPopoverClose" type="button" data-close-popover>Close</button>
		</div>
		<label class="aptChatField">
			<span>Email</span>
			<input class="aptChatInput" id="chatUserSearchInput" type="email" placeholder="user@apt.local" autocomplete="off" />
		</label>
		<div class="aptChatUserList" id="chatUserSearchList"></div>
		<div class="aptChatTip">Nhập email rồi nhấn Enter để mở chat.</div>
	</div>
</div>
			</div>
			<div class="aptChatSidebarBody">
				<div class="aptChatEmpty">Bạn cần là cư dân của 1 chung cư hoặc tạo chat riêng.</div>
			</div>
		</div>

		<div class="aptChatPanel aptChatMain">
			<div class="aptChatMainHeader">
				<div class="left">
					<div class="aptChatH1">Chọn một cuộc trò chuyện</div>
					<div class="aptChatH2">Tạo chat riêng hoặc tham gia nhóm chung cư của bạn.</div>
				</div>
				<div class="right">
					<a class="aptChatBtn aptChatBtnGhost" th:href="@{/}">Thoát</a>
				</div>
			</div>
			<div class="aptChatMsgs">
				<div class="aptChatEmpty">Không có dữ liệu.</div>
			</div>
			<div class="aptChatComposer">
				<div class="aptChatComposerRow">
					<textarea class="aptChatTextarea" rows="1" placeholder="Nhập tin nhắn..." disabled></textarea>
					<button class="aptChatBtn disabled" type="button">Gửi</button>
				</div>
			</div>
		</div>
	</div>
</section>
<script th:src="@{/phong/chat.js}"></script>
</html>
