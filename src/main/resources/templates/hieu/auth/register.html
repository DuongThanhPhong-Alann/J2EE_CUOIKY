<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Đăng ký</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/apt/apt-ui.css}" />
</head>
<body class="auth">
<main class="auth-card">
	<div class="auth-head">
		<div class="logo">APT</div>
		<h1>Đăng ký</h1>
		<p class="muted">Tạo tài khoản mới (mặc định loại <span class="mono">Khach</span>).</p>
	</div>

	<div class="alert alert--danger" th:if="${formError}" th:text="${formError}">Lỗi</div>

	<form method="post" th:action="@{/register}" th:object="${form}">
		<label class="field">
			<span class="field__label">Họ tên</span>
			<input class="input" type="text" th:field="*{hoTen}" required />
			<span class="error" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}">Lỗi</span>
		</label>

		<label class="field">
			<span class="field__label">Email</span>
			<input class="input" type="email" th:field="*{email}" autocomplete="username" required />
			<span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Lỗi</span>
		</label>

		<label class="field">
			<span class="field__label">Số điện thoại</span>
			<input class="input" type="text" th:field="*{soDienThoai}" />
		</label>

		<label class="field">
			<span class="field__label">Mật khẩu</span>
			<input class="input" type="password" th:field="*{matKhau}" autocomplete="new-password" required />
			<span class="error" th:if="${#fields.hasErrors('matKhau')}" th:errors="*{matKhau}">Lỗi</span>
		</label>

		<button class="btn btn--primary" type="submit">Tạo tài khoản</button>
	</form>

	<div class="auth-foot">
		<a class="link" th:href="@{/login}">Đăng nhập</a>
		<a class="link" th:href="@{/}">Về trang chủ</a>
	</div>
</main>
</body>
</html>
