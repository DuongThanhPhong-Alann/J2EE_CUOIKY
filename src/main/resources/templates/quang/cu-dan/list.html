<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{apt/fragments/app-layout :: page('Cư dân', ~{::section})}">
<section>
	<div class="page-head">
		<div>
			<h1>Cư dân</h1>
			<p class="muted">Gán người dùng vào căn hộ.</p>
		</div>
		<div class="page-head__actions">
			<a class="btn btn--primary" sec:authorize="hasRole('ADMIN')" th:href="@{/cu-dan/them}">Thêm cư dân</a>
		</div>
	</div>

	<form class="filter" method="get" th:action="@{/cu-dan}">
		<label class="field">
			<span class="field__label">Người dùng</span>
			<select class="input" name="idNguoiDung">
				<option value="" th:selected="${selectedUserId == null}">Tất cả</option>
				<option th:each="u : ${users}"
				        th:value="${u.id}"
				        th:selected="${selectedUserId != null && selectedUserId == u.id}"
				        th:text="${u.hoTen + ' • ' + u.email}">
					User
				</option>
			</select>
		</label>
		<label class="field">
			<span class="field__label">Chung cư</span>
			<select class="input" name="idChungCu">
				<option value="" th:selected="${selectedBuildingId == null}">Tất cả</option>
				<option th:each="b : ${buildings}"
				        th:value="${b.id}"
				        th:selected="${selectedBuildingId != null && selectedBuildingId == b.id}"
				        th:text="${b.ten}">
					Chung cư
				</option>
			</select>
		</label>
		<button class="btn" type="submit">Lọc</button>
		<a class="btn" th:href="@{/cu-dan}">Reset</a>
	</form>

	<div class="table-wrap" sec:authorize="hasRole('ADMIN')">
		<table class="table">
			<thead>
			<tr>
				<th style="width: 80px;">ID</th>
				<th>Người dùng</th>
				<th style="width: 160px;">Căn hộ</th>
				<th>Chung cư</th>
				<th style="width: 120px;">Chủ hộ</th>
				<th style="width: 220px;"></th>
			</tr>
			</thead>
			<tbody>
			<tr th:if="${#lists.isEmpty(items)}">
				<td colspan="6" class="muted">Chưa có cư dân nào.</td>
			</tr>
			<tr th:each="cd : ${items}">
				<td th:text="${cd.id}">1</td>
				<td>
					<div th:if="${usersById[cd.idNguoiDung] != null}">
						<div th:text="${usersById[cd.idNguoiDung].hoTen}">Tên</div>
						<div class="muted mono" th:text="${usersById[cd.idNguoiDung].email}">email</div>
					</div>
					<div th:if="${usersById[cd.idNguoiDung] == null}" class="muted" th:text="'#' + ${cd.idNguoiDung}">#</div>
				</td>
				<td>
					<div th:if="${apartmentsById[cd.idCanHo] != null}" class="mono" th:text="${apartmentsById[cd.idCanHo].maCan}">A-101</div>
					<div th:if="${apartmentsById[cd.idCanHo] == null}" class="muted" th:text="'#' + ${cd.idCanHo}">#</div>
				</td>
				<td th:text="${buildingNames[cd.idChungCu]} != null ? ${buildingNames[cd.idChungCu]} : ('#' + cd.idChungCu)">Chung cư</td>
				<td>
					<span class="pill" th:text="${cd.laChuHo} ? 'Có' : 'Không'">Không</span>
				</td>
				<td class="td-actions">
					<a class="btn btn--sm" th:href="@{/cu-dan/{id}(id=${cd.id})}">Xem</a>
					<a class="btn btn--sm" th:href="@{/cu-dan/{id}/sua(id=${cd.id})}">Sửa</a>
					<form class="inline" th:action="@{/cu-dan/{id}/xoa(id=${cd.id})}" method="post">
						<button class="btn btn--sm btn--danger" type="submit"
						        onclick="return confirm('Xóa cư dân này?');">
							Xóa
						</button>
					</form>
				</td>
			</tr>
			</tbody>
		</table>
	</div>

	<div class="grid grid--2" sec:authorize="!hasRole('ADMIN')">
		<div class="card" th:if="${#lists.isEmpty(items)}">
			<div class="muted">Chưa có cư dân nào.</div>
		</div>
		<div class="card" th:each="cd : ${items}">
			<div class="card__title" th:text="${usersById[cd.idNguoiDung] != null ? usersById[cd.idNguoiDung].hoTen : ('#' + cd.idNguoiDung)}">Tên</div>
			<div class="muted mono" th:if="${usersById[cd.idNguoiDung] != null}" th:text="${usersById[cd.idNguoiDung].email}">email</div>

			<div class="kv" style="margin-top:10px">
				<div class="kv__k">Căn hộ</div>
				<div class="kv__v mono" th:text="${apartmentsById[cd.idCanHo] != null ? apartmentsById[cd.idCanHo].maCan : ('#' + cd.idCanHo)}">A-101</div>
			</div>
			<div class="kv">
				<div class="kv__k">Chung cư</div>
				<div class="kv__v" th:text="${buildingNames[cd.idChungCu]} != null ? ${buildingNames[cd.idChungCu]} : ('#' + cd.idChungCu)">Chung cư</div>
			</div>
			<div class="kv">
				<div class="kv__k">Chủ hộ</div>
				<div class="kv__v"><span class="pill" th:text="${cd.laChuHo} ? 'Có' : 'Không'">Không</span></div>
			</div>

			<div class="card__actions" style="margin-top:12px">
				<a class="btn btn--sm" th:href="@{/cu-dan/{id}(id=${cd.id})}">Xem</a>
			</div>
		</div>
	</div>
</section>
</html>
