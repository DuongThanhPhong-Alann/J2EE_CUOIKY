<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{apt/fragments/app-layout :: page('Chi tiết cư dân', ~{::section})}">
<section>
	<div class="page-head">
		<div>
			<h1>Cư dân</h1>
			<p class="muted" th:text="'#' + ${item.id}">#1</p>
		</div>
		<div class="page-head__actions">
			<a class="btn" th:href="@{/cu-dan}">Danh sách</a>
			<a class="btn btn--primary" sec:authorize="hasRole('ADMIN')" th:href="@{/cu-dan/{id}/sua(id=${item.id})}">Sửa</a>
			<form class="inline" sec:authorize="hasRole('ADMIN')" th:action="@{/cu-dan/{id}/xoa(id=${item.id})}" method="post">
				<button class="btn btn--danger" type="submit"
				        onclick="return confirm('Xóa cư dân này?');">
					Xóa
				</button>
			</form>
		</div>
	</div>

	<div class="grid grid--2">
		<div class="card">
			<div class="kv">
				<div class="kv__k">Người dùng</div>
				<div class="kv__v">
					<div th:if="${user != null}">
						<div th:text="${user.hoTen}">Tên</div>
						<div class="muted mono" th:text="${user.email}">email</div>
					</div>
					<div th:if="${user == null}" class="muted" th:text="'#' + ${item.idNguoiDung}">#</div>
				</div>
			</div>
			<div class="kv">
				<div class="kv__k">Chủ hộ</div>
				<div class="kv__v">
					<span class="pill" th:text="${item.laChuHo} ? 'Có' : 'Không'">Không</span>
				</div>
			</div>
		</div>

		<div class="card">
			<div class="kv">
				<div class="kv__k">Căn hộ</div>
				<div class="kv__v">
					<span th:if="${apartment != null}" class="mono" th:text="${apartment.maCan}">A-101</span>
					<span th:if="${apartment == null}" class="muted" th:text="'#' + ${item.idCanHo}">#</span>
				</div>
			</div>
			<div class="kv">
				<div class="kv__k">Chung cư</div>
				<div class="kv__v">
					<span th:if="${building != null}" th:text="${building.ten}">Chung cư</span>
					<span th:if="${building == null}" class="muted" th:text="'#' + ${item.idChungCu}">#</span>
				</div>
			</div>
			<div class="card__actions">
				<a class="btn" sec:authorize="hasRole('ADMIN')" th:if="${user != null}" th:href="@{/nguoi-dung/{id}(id=${user.id})}">Xem người dùng</a>
				<a class="btn" th:if="${apartment != null}" th:href="@{/can-ho/{id}(id=${apartment.id})}">Xem căn hộ</a>
				<a class="btn" th:if="${building != null}" th:href="@{/chung-cu/{id}(id=${building.id})}">Xem chung cư</a>
			</div>
		</div>
	</div>
</section>
</html>
