<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{vy/fragments/layout :: page('Chi tiết căn hộ', ~{::section})}">
<section>
	<div class="page-head">
		<div>
			<h1>
				<span th:text="${item.maCan}">A-101</span>
				<span class="pill" th:text="${item.trangThai}">Trạng thái</span>
			</h1>
			<p class="muted" th:text="'#' + ${item.id}">#1</p>
		</div>
		<div class="page-head__actions">
			<a class="btn" th:href="@{/can-ho}">Danh sách</a>
			<a class="btn btn--primary" th:href="@{/can-ho/{id}/sua(id=${item.id})}">Sửa</a>
			<form class="inline" th:action="@{/can-ho/{id}/xoa(id=${item.id})}" method="post">
				<button class="btn btn--danger" type="submit"
				        onclick="return confirm('Xóa căn hộ này?');">
					Xóa
				</button>
			</form>
		</div>
	</div>

	<div class="grid grid--2">
		<div class="card">
			<div class="kv">
				<div class="kv__k">Chung cư</div>
				<div class="kv__v">
					<span th:if="${building != null}" th:text="${building.ten}">Chung cư</span>
					<span th:if="${building == null}" th:text="'#' + ${item.idChungCu}">#</span>
				</div>
			</div>
			<div class="kv" th:if="${item.soPhong != null}">
				<div class="kv__k">Số phòng</div>
				<div class="kv__v" th:text="${item.soPhong}">0</div>
			</div>
			<div class="kv" th:if="${item.dienTich != null}">
				<div class="kv__k">Diện tích</div>
				<div class="kv__v" th:text="${item.dienTich}">0</div>
			</div>
			<div class="kv" th:if="${item.gia != null}">
				<div class="kv__k">Giá</div>
				<div class="kv__v" th:text="${item.gia}">0</div>
			</div>
			<div class="kv" th:if="${item.moTa != null && !item.moTa.isBlank()}">
				<div class="kv__k">Mô tả</div>
				<div class="kv__v" th:text="${item.moTa}">...</div>
			</div>

			<div class="kv" th:if="${item.model3DUrl != null && !item.model3DUrl.isBlank()}">
				<div class="kv__k">Model 3D</div>
				<div class="kv__v">
					<a class="link" th:href="${item.model3DUrl}" th:text="${item.model3DUrl}" target="_blank" rel="noreferrer">link</a>
				</div>
			</div>
			<div class="kv" th:if="${item.sketchfabUrl != null && !item.sketchfabUrl.isBlank()}">
				<div class="kv__k">Sketchfab</div>
				<div class="kv__v">
					<a class="link" th:href="${item.sketchfabUrl}" th:text="${item.sketchfabUrl}" target="_blank" rel="noreferrer">link</a>
				</div>
			</div>
			<div class="kv" th:if="${item.urls != null && !item.urls.isBlank()}">
				<div class="kv__k">URLs</div>
				<div class="kv__v" th:text="${item.urls}">...</div>
			</div>
		</div>

		<div class="card">
			<div class="card__title">Hình ảnh</div>
			<p class="muted" th:if="${#lists.isEmpty(images)}">Chưa có hình ảnh.</p>
			<div class="img-grid" th:if="${!#lists.isEmpty(images)}">
				<div class="img-item" th:each="img : ${images}">
					<img class="img" th:src="${img.duongDan}" th:alt="${item.maCan}" />
					<div class="img-caption" th:text="${img.duongDan}">path</div>
				</div>
			</div>
		</div>
	</div>
</section>
</html>
