<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{apt/fragments/app-layout :: page(${mode == 'edit'} ? 'Sửa căn hộ' : 'Thêm căn hộ', ~{::section})}">
<section>
	<div class="page-head">
		<div>
			<h1 th:text="${mode == 'edit'} ? 'Sửa căn hộ' : 'Thêm căn hộ'">Thêm căn hộ</h1>
			<p class="muted" th:if="${mode != 'edit'}">Tạo mới một căn hộ.</p>
			<p class="muted" th:if="${mode == 'edit'}" th:text="'Chỉnh sửa căn hộ #' + ${item.id}">Chỉnh sửa</p>
		</div>
		<div class="page-head__actions">
			<a class="btn" th:href="@{/can-ho}">Quay lại</a>
			<a class="btn" th:if="${mode == 'edit'}" th:href="@{/can-ho/{id}(id=${item.id})}">Xem chi tiết</a>
		</div>
	</div>

	<div class="alert alert--danger" th:if="${formError}" th:text="${formError}">
		Lỗi
	</div>

	<div class="alert" th:if="${residentEditable}">
		Bạn đang sửa căn hộ với quyền chủ hộ. Bạn được phép đổi <b>giá</b>, <b>mô tả</b> và <b>media</b> của căn hộ.
	</div>

	<form class="form"
	      th:action="${mode == 'edit'} ? @{/can-ho/{id}/sua(id=${item.id})} : @{/can-ho/them}"
	      th:object="${form}"
	      method="post">
		<div class="form-grid">
			<label class="field">
				<span class="field__label" th:classappend="${residentEditable} ? ' field__label--locked' : ''">Mã căn <span class="req">*</span></span>
				<input class="input" type="text" th:field="*{maCan}" placeholder="VD: A-101" th:readonly="${residentEditable}" th:classappend="${residentEditable} ? ' input--locked' : ''" />
				<span class="error" th:if="${#fields.hasErrors('maCan')}" th:errors="*{maCan}">Lỗi</span>
			</label>
			<label class="field" th:if="${residentEditable}">
				<span class="field__label field__label--locked">Chung cư</span>
				<input class="input input--locked" type="text"
				       th:value="${residentBuildingName}"
				       readonly />
				<input type="hidden" th:field="*{idChungCu}" />
			</label>

			<label class="field" th:if="${residentEditable == null || !residentEditable}">
				<span class="field__label">Chung cư <span class="req">*</span></span>
				<select class="input" th:field="*{idChungCu}">
					<option value="" disabled th:selected="${form.idChungCu == null}">-- Chọn chung cư --</option>
					<option th:each="b : ${buildings}" th:value="${b.id}" th:text="${b.ten}">Chung cư</option>
				</select>
				<span class="error" th:if="${#fields.hasErrors('idChungCu')}" th:errors="*{idChungCu}">Lỗi</span>
			</label>

			<div class="row">
				<label class="field">
					<span class="field__label" th:classappend="${residentEditable} ? ' field__label--locked' : ''">Số phòng</span>
					<input class="input" type="number" th:field="*{soPhong}" placeholder="VD: 2" th:readonly="${residentEditable}" th:classappend="${residentEditable} ? ' input--locked' : ''" />
					<span class="error" th:if="${#fields.hasErrors('soPhong')}" th:errors="*{soPhong}">Lỗi</span>
				</label>

				<label class="field">
					<span class="field__label" th:classappend="${residentEditable} ? ' field__label--locked' : ''">Diện tích</span>
					<input class="input" type="number" step="0.01" th:field="*{dienTich}" placeholder="VD: 68.5" th:readonly="${residentEditable}" th:classappend="${residentEditable} ? ' input--locked' : ''" />
					<span class="error" th:if="${#fields.hasErrors('dienTich')}" th:errors="*{dienTich}">Lỗi</span>
				</label>
			</div>

			<div class="row">
				<label class="field">
					<span class="field__label">Giá</span>
					<input class="input" type="number" step="0.01" th:field="*{gia}" placeholder="VD: 2500000000" />
					<span class="error" th:if="${#fields.hasErrors('gia')}" th:errors="*{gia}">Lỗi</span>
				</label>

				<label class="field">
					<span class="field__label" th:classappend="${residentEditable} ? ' field__label--locked' : ''">Trạng thái <span class="req">*</span></span>
					<input class="input" type="text" th:field="*{trangThai}" placeholder="VD: Dang ban / Da ban / Dang thue" th:readonly="${residentEditable}" th:classappend="${residentEditable} ? ' input--locked' : ''" />
					<span class="error" th:if="${#fields.hasErrors('trangThai')}" th:errors="*{trangThai}">Lỗi</span>
				</label>
			</div>

			<label class="field">
				<span class="field__label">Mô tả</span>
				<textarea class="input" rows="4" th:field="*{moTa}" placeholder="Thông tin thêm về căn hộ..."></textarea>
			</label>

			<label class="field">
				<span class="field__label">Model 3D URL</span>
				<input class="input" type="url" th:field="*{model3DUrl}" placeholder="https://..." />
			</label>

			<label class="field">
				<span class="field__label">Sketchfab URL</span>
				<input class="input" type="url" th:field="*{sketchfabUrl}" placeholder="https://sketchfab.com/..." />
			</label>

			<label class="field">
				<span class="field__label">Ảnh (URL)</span>
				<textarea class="input" rows="4" th:field="*{urls}" placeholder="Mỗi URL ảnh một dòng&#10;VD: https://.../1.jpg&#10;https://.../2.png"></textarea>
			</label>

			<div class="card" th:if="${mode == 'edit'}">
				<div class="card__title">Ảnh hiện có</div>
				<p class="muted" th:if="${#lists.isEmpty(urlImages) && #lists.isEmpty(images)}">Chưa có hình ảnh.</p>
				<p class="muted" th:if="${!#lists.isEmpty(urlImages) || !#lists.isEmpty(images)}">
					Tick ảnh cần xóa rồi bấm <b>Lưu thay đổi</b>.
				</p>

				<div class="img-grid" th:if="${!#lists.isEmpty(urlImages)}">
					<div class="img-item" th:each="u : ${urlImages}">
						<img class="img" th:src="${u}" th:alt="${form.maCan}" />
						<label class="img-remove">
							<input type="checkbox" name="deleteUrlImages" th:value="${u}" />
							<span>Xóa</span>
						</label>
					</div>
				</div>

				<div class="img-grid" th:if="${!#lists.isEmpty(images)}">
					<div class="img-item" th:each="img : ${images}" th:if="${urlImageSet == null || !urlImageSet.contains(img.duongDan)}">
						<img class="img" th:src="${img.duongDan}" th:alt="${form.maCan}" />
						<label class="img-remove">
							<input type="checkbox" name="deleteImageIds" th:value="${img.id}" />
							<span>Xóa</span>
						</label>
					</div>
				</div>
			</div>
		</div>

		<div class="form-actions">
			<button class="btn btn--primary" type="submit"
			        th:text="${mode == 'edit'} ? 'Lưu thay đổi' : 'Tạo căn hộ'">Lưu</button>
		</div>
	</form>
</section>
</html>
