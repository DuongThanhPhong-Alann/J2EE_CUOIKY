spring.application.name=J2EE

# MySQL (Laragon) ------------------------------------------------------------
# You can override these via env vars: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:apt}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep schema managed via db/mysql/*.sql; avoid Hibernate altering existing data types.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT: keep table/column names exactly as annotated (@Table/@Column),
# to match the provided MySQL schema in db/mysql/apt_schema.sql (e.g. `ChungCus`, `ID_ChungCu`, ...).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
